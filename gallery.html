<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Explore artwork from Sultan Art Gallery.">
  <title>Gallery — Sultan Art Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="gallery-page">
  <header class="site-header">
    <a class="brand" href="index.html"><span>SULTAN</span> ART GALLERY</a>
    <button class="menu-button" type="button" aria-expanded="false" aria-controls="site-nav"><span></span><span></span></button>
    <nav id="site-nav" class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a><a data-nav="my-drawing" href="gallery.html?view=my-drawing">My Drawings</a><a data-nav="ai-art" href="gallery.html?view=ai-art">AI Art</a><a data-nav="Nekorin" href="gallery.html?view=Nekorin">Nekorin</a>
    </nav>
  </header>
  <main class="gallery-main section-shell">
    <header class="gallery-heading"><p id="gallery-kicker" class="eyebrow">Personal archive</p><h1 id="gallery-title">MY DRAWINGS</h1><p id="gallery-intro">Original artwork drawn by me.</p><span id="gallery-count"></span></header>
    <div id="artwork-grid" class="artwork-grid" aria-live="polite"></div>
    <p id="empty-gallery" class="empty-gallery" hidden>No artwork has been added to this collection yet.</p>
  </main>
  <footer><a class="brand" href="index.html"><span>SULTAN</span> ART GALLERY</a><p>Personal digital art archive.</p></footer>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" hidden>
    <button class="lightbox-close" type="button" aria-label="Close viewer">×</button>
    <button class="lightbox-nav previous" type="button" aria-label="Previous artwork">←</button>
    <figure><div class="lightbox-image-wrap"><img id="lightbox-image" alt=""></div><figcaption><p id="lightbox-type"></p><h2 id="lightbox-title"></h2><p id="lightbox-meta"></p><p id="lightbox-description"></p></figcaption></figure>
    <button class="lightbox-nav next" type="button" aria-label="Next artwork">→</button>
    <p class="lightbox-position"><span id="lightbox-current">01</span> / <span id="lightbox-total">01</span></p>
  </div>
  <script src="data/artworks.js"></script><script src="app.js"></script>
</body>
</html>
